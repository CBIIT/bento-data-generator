#####################################################
# Missing Terms:  Terms in the model but at the moment do not have custom values will default to "lorem ipsum"
# Numeric Values: Terms that are numeric, user can set min and max ranges
# String_Values:  Terms that do not have Enums in the model but user can add custom to prevent default "lorem ipsum"
#                 Also can be used in place of CADSR terms for cases user wants specific terms
# WeightProperties: can custom weight for Enums if user wants to have a term more prevelant (currently selects uniformaly)
#########################################################################################
Missing_Terms:
  program:
    - program_short_description
    - program_full_description
    - program_sort_order
  study:
    - study_population
    - study_organization
  publication:
    - publication_title
  surgery:
    - surgical_procedure_findings
    - extent_of_residual_disease
    - surgical_procedure
  file:
    - data_file_description
  next_generation_sequencing_assay:
    - target_capture_kit
  immune_assay:
    - antibody_used_for_immune_based_assay 
    - clone
    - antigen
  cell_based_assay:
    - antibody_used_for_cell_based_assay
    - roi_id
#########################################################################################
Numeric_Values:
  age_at_enrollment:
    minimum: 18      #min age of participant in study (at time of enrollment)
    maximum: 90      #max age of participant in study (at time of enrollment)
  participant_age_at_diagnosis:
    Min: 10 #*365      #min age of participant in study (at time of enrollment)
    maximum: 90 #*365      #max age of participant in study (at time of enrollment)
  height:
    minimum: 140  #1 * 2.54     #height has to be a positive number greate then 0
    maximum: 190  #120 * 2.54   #height in cm and this would be 10 feet tall
  weight:
    minimum: 40   # 1/2.205      #weight has to be a positive number greater then 0
    maximum: 150  #750/2.205     #weight is in kg and this would be a person who is 750 lbs 
  ncbi_taxonomy_id:
    minimum: 9606
    maximum: 9606
  consent_group_number:
    minimum: 1
    maximum: 1
  necrosis_area_percentage:
    minimum: 0
    maximum: 100
  viable_tumor_area_percentage:
    minimum: 0
    maximum: 100
  tumor_tissue_total_area_percentage:
    minimum: 0
    maximum: 100
  year_of_publication:  #must be a 4 digit number in YYYY format
    minimum: 2000
    maximum: 2025
  sequencing_read_length:
    minimum: 10
    maximum: 30
  radiation_dose:
    minimum: 25
    maximum: 100
  total_radiation_dose:
    minimum: 25
    maximum: 100
  targeted_therapy_dose:
    minimum: 25
    maximum: 100
  non_targeted_therapy_dose:
    minimum: 25
    maximum: 100
  a260_a230:
    minimum: 0
    maximum: 5
  fibrosis_area_percentage:
    minimum: 0
    maximum: 100


